<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient for the brain -->
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#brainGradient)" opacity="0.1"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#brainGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Brain outline -->
  <g transform="translate(50, 50)" filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M-2,0 
             C-2,-15 -8,-22 -18,-25
             C-22,-26 -28,-22 -30,-15
             C-32,-10 -32,-5 -30,0
             C-32,5 -32,10 -28,16
             C-24,22 -18,24 -12,22
             C-8,20 -4,15 -2,10
             L-2,0 Z" 
          fill="url(#brainGradient)" opacity="0.9"/>
    
    <!-- Right hemisphere -->
    <path d="M2,0 
             C2,-15 8,-22 18,-25
             C22,-26 28,-22 30,-15
             C32,-10 32,-5 30,0
             C32,5 32,10 28,16
             C24,22 18,24 12,22
             C8,20 4,15 2,10
             L2,0 Z" 
          fill="url(#brainGradient)" opacity="0.7"/>
    
    <!-- Connection nodes representing neural network/AI -->
    <circle cx="-12" cy="-18" r="3" fill="white"/>
    <circle cx="0" cy="-22" r="2.5" fill="white"/>
    <circle cx="12" cy="-18" r="3" fill="white"/>
    <circle cx="-20" cy="-5" r="2" fill="white" opacity="0.8"/>
    <circle cx="20" cy="-5" r="2" fill="white" opacity="0.8"/>
    
    <!-- Connection lines -->
    <line x1="-12" y1="-18" x2="0" y2="-22" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-22" x2="12" y2="-18" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="-12" y1="-18" x2="-20" y2="-5" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="12" y1="-18" x2="20" y2="-5" stroke="white" stroke-width="1" opacity="0.4"/>
    
    <!-- Small book/page icon in the center -->
    <rect x="-6" y="5" width="12" height="10" rx="1" fill="white" opacity="0.95"/>
    <line x1="-4" y1="9" x2="4" y2="9" stroke="#0ea5e9" stroke-width="1"/>
    <line x1="-4" y1="12" x2="4" y2="12" stroke="#0ea5e9" stroke-width="1"/>
  </g>
</svg>