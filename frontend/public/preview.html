<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain Favicon Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f5f3ff 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            gap: 40px;
            padding: 40px;
        }
        
        .preview-container {
            text-align: center;
            gap: 30px;
        }
        
        h1 {
            color: #1e293b;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .icon-sizes {
            display: flex;
            gap: 40px;
            align-items: flex-end;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .icon-item span {
            color: #64748b;
            font-size: 12px;
        }
        
        .bg-dark {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <h1>🎨 Second Brain Favicon Preview</h1>
        
        <div class="icon-sizes">
            <!-- Small size -->
            <div class="icon-item">
                <img src="favicon.svg" width="16" height="16" alt="favicon 16x16">
                <span>16x16</span>
            </div>
            
            <!-- Medium size -->
            <div class="icon-item">
                <img src="favicon.svg" width="32" height="32" alt="favicon 32x32">
                <span>32x32</span>
            </div>
            
            <!-- Large size -->
            <div class="icon-item">
                <img src="favicon.svg" width="64" height="64" alt="favicon 64x64">
                <span>64x64</span>
            </div>
            
            <!-- XLarge size -->
            <div class="icon-item">
                <img src="favicon.svg" width="128" height="128" alt="favicon 128x128">
                <span>128x128</span>
            </div>
            
            <!-- On dark background -->
            <div class="icon-item">
                <div class="bg-dark">
                    <img src="favicon.svg" width="64" height="64" alt="favicon on dark">
                </div>
                <span>深色背景</span>
            </div>
        </div>
    </div>
    
    <!-- Standalone SVG display -->
    <div class="preview-container">
        <h1>📐 Full Size SVG</h1>
        <img src="favicon.svg" width="200" height="200" alt="full svg">
    </div>
    
    <p style="color: #64748b; font-size: 14px;">
        💡 提示：SVG 可无限缩放，保持清晰度
    </p>
</body>
</html>
